name: PR body check

# Fail a PR whose description still contains template guidance comments.
# The template ships `<!-- ... -->` reminders that render invisibly on the page
# but survive into the squash-merge commit message. A finished body — human- or
# agent-written — should never contain them, so there is no legitimate exception
# to whitelist. Removing them also forces the author past the `Closes #` line.
on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read

jobs:
  body-check:
    runs-on: ubuntu-latest
    steps:
      - name: Reject leftover template comments
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          if printf '%s' "$PR_BODY" | grep -q '<!--'; then
            echo "::error::The PR description still contains template comments (<!-- ... -->)."
            echo "Remove every <!-- --> comment before merging — they leak into the squash-merge"
            echo "commit message. While editing, confirm the 'Closes #<issue>' line is filled in."
            exit 1
          fi
          echo "PR body is clean (no leftover template comments)."
