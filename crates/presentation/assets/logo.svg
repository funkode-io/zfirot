<?xml version="1.0" encoding="UTF-8"?>
<!--
  Zfirot ZF monogram app/window icon (source of truth).

  A rounded-square brand-navy tile with the ZF monogram drawn in white on top,
  so the icon stays legible on both light and dark docks/taskbars. The monogram
  itself mirrors the inline `ZfirotLogo` component in src/app.rs: two equal-weight
  strokes with round caps/joins where the Z's bottom bar runs through the F stem
  to form the F's middle arm, with a slight forward lean (skewX).

  This file is the source for `assets/icon.png` (the runtime window icon). After
  editing, regenerate the PNG with `make icon`.
-->
<svg
  xmlns="http://www.w3.org/2000/svg"
  width="512"
  height="512"
  viewBox="68 63 460 460"
>
  <!-- Rounded-square brand tile. -->
  <rect
    x="68"
    y="63"
    width="460"
    height="460"
    rx="104"
    fill="#0a192f"
  />
  <!-- ZF monogram, drawn in white on the tile. -->
  <g
    fill="none"
    stroke="#ffffff"
    stroke-width="56"
    stroke-linecap="round"
    stroke-linejoin="round"
    transform="translate(34,0) skewX(-7)"
  >
    <!-- Letter Z: top bar -> diagonal -> bottom bar (extends into the F). -->
    <path d="M 138,156
             Q 216,146 292,152
             Q 224,250 150,338
             Q 300,348 452,334" />
    <!-- Letter F: stem + top bar (middle arm is the Z's bottom bar). -->
    <path d="M 352,188
             Q 345,314 350,440
             M 350,188
             Q 406,182 462,194" />
  </g>
</svg>
